name: Backend CI

# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push and pull-request targeting main or develop that touches
# backend files.  No deployment credentials are required — this workflow only
# validates code quality and dependency integrity.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
    paths:
      - 'goodsgo-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'goodsgo-backend/**'
      - '.github/workflows/backend-ci.yml'

# Cancel superseded runs on the same branch to save runner minutes.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Backend
    runs-on: ubuntu-latest

    # All steps run from inside goodsgo-backend/ unless overridden.
    defaults:
      run:
        working-directory: goodsgo-backend

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Runtime ─────────────────────────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: goodsgo-backend/package-lock.json

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        # npm ci installs exactly what package-lock.json describes — no
        # resolution surprises.  Fails if lock file is out of sync.
        run: npm ci

      # ── 4. Syntax validation ───────────────────────────────────────────────
      # node --check parses each file without executing it.  It catches syntax
      # errors, unexpected tokens, and structural issues that would prevent the
      # file from loading.  This is NOT a test; it is not a runtime check.
      - name: Syntax check — entry point
        run: node --check server.js

      - name: Syntax check — all source files
        run: |
          failed=0
          while IFS= read -r file; do
            if ! node --check "$file" 2>&1; then
              echo "::error file=$file::Syntax error detected"
              failed=1
            fi
          done < <(find src -name "*.js" -not -path "*/node_modules/*")
          if [ "$failed" -ne 0 ]; then
            echo "One or more source files failed syntax check."
            exit 1
          fi
          echo "All $(find src -name '*.js' -not -path '*/node_modules/*' | wc -l) source files passed syntax check."

      # ── 5. Security audit ──────────────────────────────────────────────────
      # Critical vulnerabilities block the build; high-severity are reported
      # but left as a non-blocking warning so pre-existing audit noise from
      # transitive deps does not permanently break CI.
      - name: Audit — critical vulnerabilities (blocking)
        run: npm audit --audit-level=critical

      - name: Audit — high vulnerabilities (informational)
        run: npm audit --audit-level=high
        continue-on-error: true
